# Reusable Go CI pipeline for every flagstonehq repo.
# Call it from a repo with:
#
#   jobs:
#     go:
#       uses: flagstonehq/.github/.github/workflows/go-ci.yml@main
#       with:
#         needs-db: true   # set false for repos without DB-backed tests (SDKs, the cloud overlay)
#
name: Go CI (reusable)

on:
  workflow_call:
    inputs:
      needs-db:
        description: "Spin up Postgres + Redis for tests that need them."
        type: boolean
        default: false

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Cache golangci-lint
        id: cache-golangci
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ hashFiles('go.mod') }}
      - name: Install golangci-lint
        if: steps.cache-golangci.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: ${{ !inputs.needs-db }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  test-db:
    name: Test (with DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: ${{ inputs.needs-db }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flagstone_test
          POSTGRES_USER: flagstone
          POSTGRES_PASSWORD: test_password
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flagstone"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # In postgres:16-alpine the superuser is POSTGRES_USER (flagstone), not
      # "postgres". Use that user to install citext before tests run.
      - name: Enable citext extension
        run: psql -U flagstone -d flagstone_test -c "CREATE EXTENSION IF NOT EXISTS citext;"
        env:
          PGPASSWORD: test_password
          PGHOST: localhost
      - name: Run tests
        env:
          DATABASE_URL: postgres://flagstone:test_password@localhost:5432/flagstone_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test, test-db]
    if: ${{ !cancelled() && !failure() }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build ./...
