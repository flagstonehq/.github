# Reusable Go CI pipeline for every flagstonehq repo.
# Call it from a repo with:
#
#   jobs:
#     go:
#       uses: flagstonehq/.github/.github/workflows/go-ci.yml@main
#       with:
#         needs-db: true   # set false for repos without DB-backed tests (SDKs, the cloud overlay)
#
name: Go CI (reusable)

on:
  workflow_call:
    inputs:
      needs-db:
        description: "Spin up Postgres + Redis for tests that need them."
        type: boolean
        default: false

permissions:
  contents: read

# Pinned so the lint is reproducible and the compiled binary can be cached.
env:
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Cache the golangci-lint binary so we don't recompile it every run.
      # Keyed on the pinned version + go.mod (rebuilds if the Go toolchain bumps).
      - name: Cache golangci-lint
        id: cache-golangci
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}-${{ hashFiles('go.mod') }}
      # Build it with the project's own toolchain so its build version always
      # matches the `go` directive in go.mod (prebuilt binaries lag behind
      # bleeding-edge Go and fail the "built with an older Go" check).
      - name: Install golangci-lint
        if: steps.cache-golangci.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: $(go env GOPATH)/bin/golangci-lint run

  # Runs when the caller has no DB-backed tests (needs-db: false).
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: ${{ !inputs.needs-db }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  # Runs when the caller needs Postgres + Redis (needs-db: true).
  test-db:
    name: Test (with DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    if: ${{ inputs.needs-db }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flagstone_test
          POSTGRES_USER: flagstone
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flagstone"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        env:
          DATABASE_URL: postgres://flagstone:test_password@localhost:5432/flagstone_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # One of test / test-db is always skipped depending on needs-db. The `if`
    # below lets build proceed past the skipped one and only stops on a real
    # failure or cancellation (the documented workaround for skipped deps).
    needs: [test, test-db]
    if: ${{ !cancelled() && !failure() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
