# Reusable Go CI pipeline for every flagstonehq repo.
# Call it from a repo with:
#
#   jobs:
#     go:
#       uses: flagstonehq/.github/.github/workflows/go-ci.yml@main
#       with:
#         needs-db: true   # set false for repos without DB-backed tests (SDKs, the cloud overlay)
#
name: Go CI (reusable)

on:
  workflow_call:
    inputs:
      needs-db:
        description: "Spin up Postgres + Redis for tests that need them."
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # Build golangci-lint with the project's own toolchain so its build
      # version always matches the `go` directive in go.mod. Avoids the
      # "linter built with an older Go than the target" failure that the
      # prebuilt action binary hits on bleeding-edge Go releases.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  # Runs when the caller has no DB-backed tests (needs-db: false).
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ !inputs.needs-db }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  # Runs when the caller needs Postgres + Redis (needs-db: true).
  test-db:
    name: Test (with DB)
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ inputs.needs-db }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flagstone_test
          POSTGRES_USER: flagstone
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flagstone"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        env:
          DATABASE_URL: postgres://flagstone:test_password@localhost:5432/flagstone_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -race -coverprofile=coverage.out ./...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    # One of test / test-db is always skipped depending on needs-db. The `if`
    # below lets build proceed past the skipped one and only stops on a real
    # failure or cancellation (the documented workaround for skipped deps).
    needs: [test, test-db]
    if: ${{ !cancelled() && !failure() }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build ./...
